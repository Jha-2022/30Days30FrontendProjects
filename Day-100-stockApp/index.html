<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Test App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Polygon.io Tracker</h1>
        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="Enter Ticker (e.g. AAPL)" uppercase>
            <button onclick="fetchStockData()">Get Data</button>
        </div>
        <div id="displayBoard" class="card" style="display: none;">
            <h2 id="symbol">---</h2>
            <p class="price" id="price">$0.00</p>
            <p id="change">Change: --</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
